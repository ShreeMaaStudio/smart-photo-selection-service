<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shree Maa Studio</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #121212; color: #FF8C00; font-family: sans-serif; text-align: center; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #loader-box { padding-top: 25vh; }
        .spinner { border: 4px solid #333; border-top: 4px solid #FF8C00; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader-box">
        <div class="spinner"></div>
        <h2 id="status-text">ગેલેરી લોડ થઈ રહી છે... ⏳</h2>
    </div>
    
    <iframe id="main-frame" allow="camera; microphone; display-capture" allowfullscreen></iframe>
    
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const studioName = urlParams.get('studio');
            const mode = urlParams.get('mode');
            const iframe = document.getElementById('main-frame');
            const loaderBox = document.getElementById('loader-box');
            const statusText = document.getElementById('status-text');

            // 🚀 ગૂગલ શીટ ની લિંક્સ
            const MASTER_API = "https://script.google.com/macros/s/AKfycbzfzkNBilCrQWwp2cqdKARE5Am0srWG-U-c4PNkXf9EvBIxVZZrJc84vMqjAXALFdt0/exec";
            const CLOUD_GALLERY_URL = "https://script.google.com/macros/s/AKfycby6SVN_KMQBlKZXkp2F7NqyJPXyQqy2GO-V3qEkvcG2i2K8cylHR1E_nCd44qaMh6ms/exec";

            if(!studioName) {
                statusText.innerHTML = "<span style='color:#ff5252;'>એરર: સ્ટુડિયોનું નામ લિંકમાં નથી! ❌</span>";
                document.querySelector('.spinner').style.display = 'none';
                return;
            }

            // 🚀 માસ્ટર સર્વર પાસેથી બેકગ્રાઉન્ડમાં API ડેટા માંગો (No iframe block)
            fetch(MASTER_API + "?action=get_studio_tunnel&studio=" + encodeURIComponent(studioName))
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    let targetUrl = "";
                    
                    if (mode === "cloud") {
                        // ક્લાઉડ ગેલેરી માટે ડાયરેક્ટ Apps Script લિંક (Iframe માટે ALLOWALL સેટ છે)
                        targetUrl = CLOUD_GALLERY_URL + "?studio=" + encodeURIComponent(data.hwid) + "&mode=cloud";
                    } else {
                        // PC મોડ માટે Cloudflare ટનલ લિંક
                        if (data.cf_link && data.cf_link.startsWith("http")) {
                            targetUrl = data.cf_link;
                        } else {
                            statusText.innerHTML = "<span style='color:#ff5252;'>સ્ટુડિયો અત્યારે ઓફલાઈન છે! ❌</span>";
                            document.querySelector('.spinner').style.display = 'none';
                            return;
                        }
                    }

                    // Iframe માં સાચી લિંક સેટ કરો અને લોડર છુપાવો
                    iframe.src = targetUrl;
                    iframe.onload = function() {
                        loaderBox.style.display = 'none';
                        iframe.style.display = 'block';
                    };
                } else {
                    statusText.innerHTML = "<span style='color:#ff5252;'>એરર: " + (data.msg || "સ્ટુડિયો મળ્યો નહિ!") + " ❌</span>";
                    document.querySelector('.spinner').style.display = 'none';
                }
            })
            .catch(err => {
                statusText.innerHTML = "<span style='color:#ff5252;'>સર્વર કનેક્શન ફેલ! ફરી પ્રયાસ કરો. ❌</span>";
                document.querySelector('.spinner').style.display = 'none';
            });
        };
    </script>

    <div id="security-overlay"><span style="font-size: 50px;">⚠️</span><br>ચેતવણી!<br><span style="color:#fff; font-size:16px; margin-top:10px;">સ્ક્રીનશોટ કે સ્ક્રીન રેકોર્ડિંગ કરવું સખત મનાઈ છે.<br><br><span style="color:#FF8C00; font-size:12px;">કૃપયા ૬ સેકન્ડ રાહ જુઓ...</span></span></div>
    <style>
        .blur-active { filter: blur(50px) brightness(0) !important; pointer-events: none; }
        #security-overlay { display: none; position: fixed; inset: 0; background: #000; color: #ff5252; z-index: 99999; text-align: center; padding: 30vh 20px 0; font-size: 20px; font-weight: bold; flex-direction: column; line-height: 1.5; }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('dragstart', event => event.preventDefault());
        
        function showWarningScreen() {
            const overlay = document.getElementById('security-overlay'); 
            if (overlay) overlay.style.display = 'flex';
            document.body.classList.add('blur-active'); 
        }
        function hideWarningScreen() {
            const overlay = document.getElementById('security-overlay'); 
            if (overlay) overlay.style.display = 'none';
            document.body.classList.remove('blur-active');
        }
        function penalizeUser() { 
            showWarningScreen(); 
            setTimeout(hideWarningScreen, 6000); 
        }
        
        window.addEventListener('keyup', (e) => { if (e.key === 'PrintScreen' || e.code === 'PrintScreen') penalizeUser(); });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key.toLowerCase() === 'p') || (e.metaKey && e.shiftKey && (e.key.toLowerCase() === 's' || e.key === '3' || e.key === '4')) || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) {
                penalizeUser();
            }
        });
        window.addEventListener('blur', () => { penalizeUser(); });
        document.addEventListener('visibilitychange', () => { if (document.hidden) penalizeUser(); });
        window.addEventListener('touchstart', (e) => { if (e.touches.length >= 3) penalizeUser(); });
        document.addEventListener('copy', (e) => { e.preventDefault(); penalizeUser(); });
        document.addEventListener('cut', (e) => { e.preventDefault(); penalizeUser(); });
    </script>
</body>
</html>
