<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Share Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&family=Segoe+UI&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f0f0f; color: #FF8C00; font-family: 'Segoe UI', 'Noto Sans Gujarati', sans-serif; 
            text-align: center; padding-top: 15vh; margin: 0; user-select: none;
        }
        .box { 
            border: 2px solid #FF8C00; display: inline-block; padding: 30px 20px; 
            border-radius: 15px; box-shadow: 0 0 20px rgba(255,140,0,0.2); 
            background: #1a1a1a; max-width: 85%; width: 350px;
        }
        .loader { 
            border: 4px solid #333; border-top: 4px solid #FF8C00; border-radius: 50%; 
            width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn { 
            display: none; background: #00c853; color: #000; padding: 15px 30px; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 18px; 
            margin-top: 20px; box-shadow: 0 4px 10px rgba(0,200,83,0.4); transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        .footer { position: fixed; bottom: 10px; width: 100%; color: #555; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader" id="loader"></div>
        <h2 id="title" style="margin-top:0; font-size:22px; text-transform:uppercase;">ફાઈલ શોધાઈ રહી છે... ⏳</h2>
        <p id="desc" style="color:#aaa; font-size:14px; margin-bottom:0;">કૃપા કરી રાહ જુઓ, સ્ટુડિયોનું PC સર્વર કનેક્ટ થઈ રહ્યું છે.</p>
        
        <a href="#" id="joinBtn" class="btn">👉 ફોટા ડાઉનલોડ કરો 👈</a>
    </div>

    <div class="footer">Secured by Shree Maa Studio</div>

    <script>
        // 🚀 તમારી માસ્ટર ગૂગલ શીટની API લિંક
        const MASTER_API_URL = "https://script.google.com/macros/s/AKfycbzfzkNBilCrQWwp2cqdKARE5Am0srWG-U-c4PNkXf9EvBIxVZZrJc84vMqjAXALFdt0/exec";

        // URL માંથી સ્ટુડિયોનું નામ અને ફોલ્ડરનું નામ પકડો
        const urlParams = new URLSearchParams(window.location.search);
        const studioName = urlParams.get('studio');
        const folderName = urlParams.get('folder');

        if(!studioName || !folderName) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('title').innerText = "એરર: લિંક અધૂરી છે! ❌";
            document.getElementById('title').style.color = "#ff5252";
            document.getElementById('desc').innerText = "કૃપા કરી સ્ટુડિયો દ્વારા આપેલી પૂરી લિંક ઓપન કરો.";
        } else {
            // માસ્ટર સર્વર પાસે ફાસ્ટ ટનલની લિંક માંગો
            fetch(MASTER_API_URL + "?action=get_studio_tunnel&studio=" + encodeURIComponent(studioName))
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                
                if(data.status === "success" && data.cf_link && data.cf_link.startsWith("http")) {
                    if(data.sName) {
                        document.getElementById('title').innerText = data.sName + " READY ✅";
                    } else {
                        document.getElementById('title').innerText = "FILE READY ✅";
                    }
                    
                    document.getElementById('title').style.color = "#00c853";
                    document.getElementById('desc').innerHTML = "તમારી ડાઉનલોડ લિંક તૈયાર છે.<br><br><span style='color:#888; font-size:12px;'>નીચેના લીલા બટન પર ક્લિક કરો</span>";
                    
                    // 🚀 સાચી URL બનાવો: cf_link ની પાછળ /quick_share/folder_name લાગશે
                    let cleanCfUrl = data.cf_link.replace(/\/$/, ""); 
                    const finalLink = cleanCfUrl + "/quick_share/" + encodeURIComponent(folderName);
                    
                    const btn = document.getElementById('joinBtn');
                    btn.href = finalLink;
                    btn.style.display = "inline-block";
                    
                    // ઓટો-રીડાયરેક્ટનો પ્રયાસ કરો
                    setTimeout(() => { window.top.location.href = finalLink; }, 1000);
                } else {
                    // જો PC બંધ હોય અથવા લિંક ના મળે
                    document.getElementById('title').innerText = "સ્ટુડિયો ઓફલાઈન છે ❌";
                    document.getElementById('title').style.color = "#ff5252";
                    document.getElementById('desc').innerText = "આ ફાઈલ ડાઉનલોડ કરવા માટે સ્ટુડિયોનું કમ્પ્યુટર ચાલુ હોવું જરૂરી છે. કૃપા કરી થોડીવાર પછી પ્રયાસ કરો.";
                }
            })
            .catch(err => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('title').innerText = "સર્વર એરર ❌";
                document.getElementById('title').style.color = "#ff5252";
                document.getElementById('desc').innerText = "ઇન્ટરનેટ અથવા સર્વર કનેક્શનમાં ખામી છે. ફરી પ્રયાસ કરો.";
            });
        }
    </script>

    <div id="security-overlay"><span style="font-size: 50px;">⚠️</span><br>ચેતવણી!<br><span style="color:#fff; font-size:16px; margin-top:10px;">સ્ક્રીનશોટ કે સ્ક્રીન રેકોર્ડિંગ કરવું સખત મનાઈ છે.<br><br><span style="color:#FF8C00; font-size:12px;">કૃપયા ૬ સેકન્ડ રાહ જુઓ...</span></span></div>
    <style>
        .blur-active { filter: blur(50px) brightness(0) !important; pointer-events: none; }
        #security-overlay { display: none; position: fixed; inset: 0; background: #000; color: #ff5252; z-index: 99999; text-align: center; padding: 30vh 20px 0; font-size: 20px; font-weight: bold; flex-direction: column; line-height: 1.5; }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('dragstart', event => event.preventDefault());
        
        function showWarningScreen() {
            const overlay = document.getElementById('security-overlay'); 
            if (overlay) overlay.style.display = 'flex';
            document.querySelector('.box').classList.add('blur-active'); 
        }
        function hideWarningScreen() {
            const overlay = document.getElementById('security-overlay'); 
            if (overlay) overlay.style.display = 'none';
            document.querySelector('.box').classList.remove('blur-active');
        }
        function penalizeUser() { 
            showWarningScreen(); 
            setTimeout(hideWarningScreen, 6000); 
        }
        
        window.addEventListener('keyup', (e) => { if (e.key === 'PrintScreen' || e.code === 'PrintScreen') penalizeUser(); });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.key.toLowerCase() === 'p') || (e.metaKey && e.shiftKey && (e.key.toLowerCase() === 's' || e.key === '3' || e.key === '4')) || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) {
                penalizeUser();
            }
        });
        window.addEventListener('blur', () => { penalizeUser(); });
        document.addEventListener('visibilitychange', () => { if (document.hidden) penalizeUser(); });
        window.addEventListener('touchstart', (e) => { if (e.touches.length >= 3) penalizeUser(); });
        document.addEventListener('copy', (e) => { e.preventDefault(); penalizeUser(); });
        document.addEventListener('cut', (e) => { e.preventDefault(); penalizeUser(); });
    </script>
</body>
</html>
