<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shree Maa Studio</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #121212; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="main-frame" src="https://script.google.com/macros/s/AKfycby6SVN_KMQBlKZXkp2F7NqyJPXyQqy2GO-V3qEkvcG2i2K8cylHR1E_nCd44qaMh6ms/exec"></iframe>
    
    <script>
        // 🚀 સુરક્ષિત આઈફ્રેમ કનેક્શન એન્જિન
        window.onload = function() {
            const urlParams = window.location.search;
            const iframe = document.getElementById('main-frame');
            // જો પેરામીટર્સ ના હોય તો સીધી લિંક, હોય તો જોડી દો
            if (urlParams) {
                iframe.src = "https://script.google.com/macros/s/AKfycby6SVN_KMQBlKZXkp2F7NqyJPXyQqy2GO-V3qEkvcG2i2K8cylHR1E_nCd44qaMh6ms/exec" + urlParams;
            }
        };
    </script>
</body>
</html>
